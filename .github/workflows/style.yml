name: style

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - run: uvx ruff check croc tests main.py
      - run: uvx ruff format --check croc tests main.py
      - run: uv sync --group dev
      - run: uv run ty check croc main.py
